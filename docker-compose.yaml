services:
  database:
    image: postgres:15
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - ./database/postgres-data:/var/lib/postgresql/data
      - ./database/scripts:/docker-entrypoint-initdb.d
    networks:
      priv-knowledge-system-net:
        ipv4_address: 172.18.254.2

  server:
    hostname: knowledge-management-server
    container_name: knowledge-management-server
    build:
      context: ./backend
    ports:
      - "8080:8080"
    networks:
      priv-knowledge-system-net:
        ipv4_address: 172.18.254.3
    depends_on:
      - database
    restart: unless-stopped

  # ==================== WEB DEVELOPMENT ====================
  web:
    container_name: knowledge-management-web-dev
    build:
      context: ./web/my-app
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./web/my-app:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://172.18.254.3:8080
      - CHOKIDAR_USEPOLLING=true   # важно для hot-reload в Docker
    networks:
      priv-knowledge-system-net:
        ipv4_address: 172.18.254.4
    depends_on:
      - server
    profiles: ["dev"]
    restart: unless-stopped

  # ==================== WEB PRODUCTION ====================
  web-prod:
    container_name: knowledge-management-web
    build:
      context: ./web/my-app
      dockerfile: Dockerfile
    ports:
      - "3001:80"                   # используем другой порт, чтобы не конфликтовать
    networks:
      priv-knowledge-system-net:
        ipv4_address: 172.18.254.5
    depends_on:
      - server
    profiles: ["prod"]
    restart: unless-stopped

networks:
  priv-knowledge-system-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.254.0/28